<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <p>Numeric ops</p>
    </div>

    <script>
        let value=100
        value++
        value++
        value++
        value--
        console.log(value)

        let a=5
        let b='10'
        let c=a+b
        console.log(c)

        let d=5
        let e='10'
        let f=d/e
        console.log(f)

        let num=533
        let h=String(num)
        console.log(typeof(num))
        console.log(typeof(h))

        let val='57857'
        let new_val=Number(val)
        let new_val2=parseFloat(val)
        let new_val3=parseInt(val)
        console.log(typeof(val))
        console.log(typeof(new_val))
        console.log(typeof(new_val2))
        console.log(typeof(new_val3))

    </script>
</body>
</html>
